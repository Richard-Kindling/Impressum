<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressum – Kindling Medienrecht</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .pdf-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* Desktop: PDF embed */
        .pdf-embed {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* Mobil-Fallback: gerenderte Seiten als Bilder via PDF.js */
        #mobile-viewer {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: #525659;
            padding: 10px 0;
        }
        #mobile-viewer canvas {
            display: block;
            margin: 10px auto;
            max-width: 95%;
            height: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            background: white;
        }
        .loading {
            color: white;
            text-align: center;
            padding: 40px 20px;
            font-size: 14px;
        }
        /* Mobile detection via media query */
        @media (max-width: 768px), (hover: none) and (pointer: coarse) {
            .pdf-embed { display: none; }
            #mobile-viewer { display: block; }
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <!-- Desktop: natives PDF-Rendering -->
        <object class="pdf-embed" data="impressum.pdf#toolbar=0&navpanes=0&view=FitH" type="application/pdf">
            <iframe class="pdf-embed" src="impressum.pdf#toolbar=0&navpanes=0&view=FitH"></iframe>
        </object>

        <!-- Mobil: PDF.js rendert Seiten als Canvas (kein Download-Dialog) -->
        <div id="mobile-viewer">
            <div class="loading" id="loading">Impressum wird geladen…</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Nur auf Mobilgeräten PDF.js verwenden
        const isMobile = window.matchMedia('(max-width: 768px), (hover: none) and (pointer: coarse)').matches;

        if (isMobile && window.pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

            const viewer = document.getElementById('mobile-viewer');
            const loading = document.getElementById('loading');

            pdfjsLib.getDocument('impressum.pdf').promise.then(async (pdf) => {
                loading.remove();
                const containerWidth = viewer.clientWidth * 0.95;

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1 });
                    const scale = (containerWidth / viewport.width) * (window.devicePixelRatio || 1);
                    const scaledViewport = page.getViewport({ scale });

                    const canvas = document.createElement('canvas');
                    canvas.width = scaledViewport.width;
                    canvas.height = scaledViewport.height;
                    canvas.style.width = (scaledViewport.width / (window.devicePixelRatio || 1)) + 'px';

                    viewer.appendChild(canvas);

                    await page.render({
                        canvasContext: canvas.getContext('2d'),
                        viewport: scaledViewport
                    }).promise;
                }
            }).catch((err) => {
                loading.textContent = 'PDF konnte nicht geladen werden.';
                console.error(err);
            });
        }
    </script>
</body>
</html>
